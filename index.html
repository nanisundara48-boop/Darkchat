<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Privacy Messenger | NC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screenshot-protection-layer"></div>

    <section id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="cat-animation-wrapper">
                <div class="cat-head"></div>
                <div class="cat-paws"></div>
            </div>
            
            <div class="auth-form-box">
                <h2 class="gradient-text">Welcome</h2>
                
                <div id="new-user-form">
                    <input type="text" id="reg-username" placeholder="Choose Username" required>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                    <input type="password" id="reg-pass" placeholder="Set Password" required>
                    <button type="button" class="btn-primary" id="btn-register">Generate #ID & Enter</button>
                </div>
                
                <div id="existing-user-form" class="hidden">
                    <input type="email" id="login-email" placeholder="Email Address" required>
                    <input type="password" id="login-pass" placeholder="Password" required>
                    <button type="button" class="btn-primary" id="btn-login">Login</button>
                </div>
                
                <p class="toggle-text" id="toggle-auth-btn">Already have an account? Login</p>
            </div>
        </div>
    </section>

    <section id="nc-loading-screen" class="screen hidden">
        <div class="loader-content">
            <div class="nc-spinner"></div>
            <h3 class="gradient-text">Entering Secure Sanctuary...</h3>
        </div>
    </section>

    <section id="main-app-interface" class="screen hidden">
        
        <header class="app-header">
            <div class="header-left">
                <i class="fa-solid fa-qrcode pip-icon" id="qr-trigger"></i>
                <div class="profile-pic-container">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="user-dp" id="my-profile-pic">
                    <i class="fa-solid fa-star glowing-star hidden" id="premium-badge"></i>
                </div>
                <h3 id="main-username" class="gradient-username">Loading...</h3>
            </div>
            
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass header-icon" id="search-trigger"></i>
                <div class="notification-wrapper header-icon" id="notif-trigger">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notif-dot hidden" id="notif-count">0</span>
                </div>
                <i class="fa-solid fa-bars header-icon" id="settings-trigger"></i>
            </div>
        </header>

        <main id="app-content">
            
            <div id="tab-chats" class="tab-content active">
                <div class="chat-list" id="chat-list-container">
                    </div>
            </div>

            <div id="tab-glimpse" class="tab-content hidden">
                <div class="glimpse-list" id="glimpse-list-container">
                    </div>
                <button class="floating-cam-btn" id="open-glimpse-cam">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>

            <div id="tab-calls" class="tab-content hidden">
                <div class="call-history-list" id="call-history-container">
                    </div>
            </div>

            <div id="tab-games" class="tab-content hidden">
                <div class="games-container">
                    <div class="game-card">
                        <h3>Tic Tac Toe</h3>
                        <button class="play-bot-btn">Play vs Bot</button>
                        <button class="play-friend-btn">Play vs Friend</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer smooth-edges">
            <div class="nav-btn active" data-target="tab-chats">
                <i class="fa-solid fa-message"></i>
                <span>Chats</span>
            </div>
            <div class="nav-btn" data-target="tab-glimpse">
                <i class="fa-solid fa-camera-retro"></i>
                <span>Glimpse</span>
            </div>
            <div class="nav-btn" data-target="tab-calls">
                <i class="fa-solid fa-phone"></i>
                <span>Calls</span>
            </div>
            <div class="nav-btn" data-target="tab-games">
                <i class="fa-solid fa-gamepad"></i>
                <span>Games</span>
            </div>
        </footer>
    </section>

    <div id="active-chat-screen" class="screen hidden">
        <header class="chat-header">
            <i class="fa-solid fa-arrow-left" id="back-to-chats"></i>
            <img src="https://via.placeholder.com/40" class="chat-dp-small" id="active-chat-dp">
            <h3 class="chat-username" id="active-chat-name">Friend</h3>
            <div class="chat-actions">
                <i class="fa-solid fa-phone" id="start-voice-call"></i>
                <i class="fa-solid fa-video" id="start-video-call"></i>
                <i class="fa-solid fa-ellipsis-vertical" id="chat-settings"></i>
            </div>
        </header>
        <div class="chat-messages-area" id="messages-container">
            </div>
        <div class="chat-input-area">
            <i class="fa-solid fa-paperclip"></i>
            <input type="text" id="message-input" placeholder="Type a message...">
            <i class="fa-solid fa-paper-plane" id="send-msg-btn"></i>
        </div>
    </div>

    <div id="webrtc-call-screen" class="overlay hidden">
        <div class="call-ui-container">
            <video id="remote-video" autoplay playsinline></video>
            
            <div class="local-video-wrapper">
                <video id="local-video" autoplay muted playsinline></video>
            </div>
            
            <div class="call-info-top">
                <img src="https://via.placeholder.com/60" class="caller-dp" id="caller-dp">
                <h3 id="call-status-text">Connecting...</h3>
            </div>
            
            <div class="call-controls">
                <div class="control-btn" id="mute-audio"><i class="fa-solid fa-microphone"></i></div>
                <div class="control-btn end-call" id="end-call-btn"><i class="fa-solid fa-phone-slash"></i></div>
                <div class="control-btn" id="switch-camera"><i class="fa-solid fa-camera-rotate"></i></div>
            </div>
        </div>
    </div>

    <div id="private-auth-modal" class="overlay hidden love-ui">
        <div class="pin-box">
            <h3>Enter Secret Pattern</h3>
            <div class="pattern-grid">
                </div>
            <button class="btn-primary" id="cancel-private">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
